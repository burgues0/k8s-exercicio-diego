- name: deploy k8s
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    env: "dev"
    k8s_dir: "../k8s/{{ env }}"
    namespace: "ns-{{ env }}"
    dockerhub_email: "vituuu654@gmail.com"

  tasks:
    - name: namespace
      command: kubectl apply -f {{ k8s_dir }}/ns.yaml

    - name: quota e limit
      command: kubectl apply -f {{ k8s_dir }}/quota.yaml

    - name: secret dockerhub
      shell: |
        kubectl create secret docker-registry dockerhub-secret \
          --docker-server=https://index.docker.io/v1/ \
          --docker-username={{ dockerhub_user }} \
          --docker-password={{ dockerhub_password }} \
          --docker-email={{ dockerhub_email }} \
          -n {{ namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -
      when: dockerhub_password != ""

    - name: configmap
      command: kubectl apply -f {{ k8s_dir }}/configmap.yaml

    - name: secrets
      command: kubectl apply -f {{ item }}
      loop:
        - "{{ k8s_dir }}/auth/secret-postgres.yaml"
        - "{{ k8s_dir }}/auth/secret-auth-api.yaml"

    - name: statefulset pg
      command: kubectl apply -f {{ k8s_dir }}/auth/statefulset-postgres.yaml

    - name: aguardar postgres
      command: kubectl rollout status statefulset/postgres -n {{ namespace }} --timeout=180s

    - name: schema auth-api
      command: kubectl apply -f {{ k8s_dir }}/auth/job-schema.yaml

    - name: aguardar schema
      command: kubectl wait --for=condition=complete job/auth-schema-init -n {{ namespace }} --timeout=60s

    - name: deploy auth-api
      command: kubectl apply -f {{ item }}
      loop:
        - "{{ k8s_dir }}/auth/deployment-auth.yaml"
        - "{{ k8s_dir }}/auth/service-auth.yaml"
        - "{{ k8s_dir }}/auth/ingress-auth.yaml"
        - "{{ k8s_dir }}/auth/hpa-auth.yaml"

    - name: deploy frontend
      command: kubectl apply -f {{ item }}
      loop:
        - "{{ k8s_dir }}/frontend/deployment-front.yaml"
        - "{{ k8s_dir }}/frontend/service-front.yaml"
        - "{{ k8s_dir }}/frontend/ingress-front.yaml"
        - "{{ k8s_dir }}/frontend/hpa-front.yaml"

    - name: auth-api ready
      command: kubectl rollout status deployment/api-node-auth -n {{ namespace }} --timeout=120s

    - name: frontend ready
      command: kubectl rollout status deployment/frontend-node -n {{ namespace }} --timeout=120s

    - name: status final
      command: kubectl get all -n {{ namespace }}
      register: resultado

    - name: exibir status
      debug:
        msg: "{{ resultado.stdout_lines }}"
