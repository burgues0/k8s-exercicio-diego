- name: configurar api js
  hosts: api_server
  become: true
  vars:
    app_dir: /var/www/api
    db_host: "localstack"
    db_name: "app_database"
    db_user: "postgres"
    db_pass: "postgres"

  tasks:
    - name: criar diretorio api
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: copiar arquivos
      copy:
        src: ../api/
        dest: "{{ app_dir }}/"

    - name: gerar .env
      copy:
        dest: "{{ app_dir }}/.env"
        content: |
          DB_HOST={{ db_host }}
          DB_NAME={{ db_name }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_pass }}
          DB_DIALECT=postgres

    - name: npm install
      npm:
        path: "{{ app_dir }}"
        state: present

    - name: rodar seed
      command: npm run seed
      args:
        chdir: "{{ app_dir }}"
      register: seed_output

    - name: logs da seed
      debug:
        var: seed_output.stdout_lines

    - name: limpar processos já existentes
      shell: pkill -f "node index.js"
      ignore_errors: yes

    - name: init api
      shell: "nohup node index.js > app.log 2>&1 &"
      args:
        chdir: "{{ app_dir }}"