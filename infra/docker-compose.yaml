services:
  gh-runner:
    build: ./gh_runner
    container_name: gh_runner
    ports:
      - "2222:22"

  postgresql:
    image: postgres:17-alpine
    container_name: ${POSTGRES_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: ${SONARQUBE_CONTAINER_NAME}
    depends_on:
      - postgresql
    ports:
      - "${SONARQUBE_PORT}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      SONAR_JDBC_USERNAME: ${SONARQUBE_USERNAME}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped

  floci:
    image: floci/floci:1.5.21
    container_name: floci
    privileged: true
    user: root
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLOCI_SERVICES_EC2_SSH_PORT_RANGE_START=2300
      - FLOCI_SERVICES_EC2_SSH_PORT_RANGE_END=2399
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/ > /dev/null 2>&1; exit 0"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: