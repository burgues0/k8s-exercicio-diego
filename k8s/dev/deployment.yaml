apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-node-deployment
  namespace: ns-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-node
  template:
    metadata:
      labels:
        app: api-node
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: ambiente
                    operator: In
                    values:
                      - dev
      containers:
      - name: api-node
        image: api-node-exercicio
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: PG_HOST
          valueFrom:
            configMapKeyRef:
              name: postgres-configmap-dev
              key: POSTGRES_HOST
        - name: PG_PORT
          valueFrom:
            configMapKeyRef:
              name: postgres-configmap-dev
              key: POSTGRES_PORT
        - name: PG_DB
          valueFrom:
            configMapKeyRef:
              name: postgres-configmap-dev
              key: POSTGRES_DB
        - name: PG_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets-dev
              key: POSTGRES_USER
        - name: PG_PWD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets-dev
              key: POSTGRES_PWD
