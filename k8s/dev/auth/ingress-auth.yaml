apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-node-ingress
  namespace: ns-dev
spec:
  ingressClassName: traefik
  rules:
    - host: dev.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: api-node-service
                port:
                  number: 80
