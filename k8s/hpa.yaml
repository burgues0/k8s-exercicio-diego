apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-python-hpa
  namespace: ns-scale
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-python-deployment
  minReplicas: 2
  maxReplicas: 3

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50
    - type: Pods
      pods:
        metric:
          name: requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
