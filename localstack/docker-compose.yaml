services:
  localstack:
    image: localstack/localstack:3.8
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=ec2,rds
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"ec2\"'"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  local_rds:
      image: postgres:15-alpine
      container_name: local_rds
      ports:
        - "5432:5432"
      environment:
        POSTGRES_DB: app_database
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d app_database"]
        interval: 5s
        timeout: 5s
        retries: 5

  vm:
    build: ../vm
    container_name: vm
    ports:
      - "2222:22"
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/22'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s